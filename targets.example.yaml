# Gauntlet targets — copy to targets.yaml (gitignored) and adjust.
# A target only needs an OpenAI-compatible endpoint; `enrich` adapters add
# metadata (context, quant, reasoning flag) when the server exposes them.
#
# PRIVACY: targets are private connections to YOUR boxes. Which models live on
# which machine, endpoints, and scores are box-private — they stay in the
# gitignored targets.yaml / scorecards/, never in the shareable engine repo.
# This example uses placeholder hosts only.

targets:
  - name: desktop-lmstudio
    base_url: http://localhost:1234
    api: openai            # /v1/chat/completions, /v1/embeddings
    enrich: lmstudio       # native /api/v1/models metadata
    box: desktop           # joins the infra inventory (VRAM budget, usage classes)
  - name: laptop-ollama
    base_url: http://laptop-hostname:11434   # e.g. a Tailscale peer
    api: openai
    enrich: ollama
    box: laptop

# Box inventory the `box:` field joins to. `hardware` is the ONLY box label
# that appears in a shared scorecard (hostnames stay private). `busy: true`
# defers that box's cells (e.g. while gaming). Placeholder hardware shown.
boxes:
  - { id: desktop, hardware: "high-VRAM desktop GPU", vram_gb: 32, usage_class: broad, busy: false }
  - { id: laptop,  hardware: "laptop GPU",            vram_gb: 8,  usage_class: tight, busy: false }

# Optional explicit roster; default = discover from each target.
# A LOAD PROFILE is model @ context — same model at 8k and 128k = two rows.
models:
  - { target: desktop-lmstudio, id: 'phi-4', context: 8192 }
  - { target: desktop-lmstudio, id: 'qwen/qwen3-coder-30b', context: 32768 }

# Glob patterns skipped unless explicitly named on the command line.
keep_list:
  - '*personal-*'
  - '*uncensored*'
